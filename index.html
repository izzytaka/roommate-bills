<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Roommate Bills</title>

    <link rel="stylesheet"
          href="style.css">

    <link rel="manifest"
          href="manifest.json">

    <link rel="apple-touch-icon"
          href="icon-192.png">
</head>

<body>

    <div id="app">

        <!-- Login Screen -->
        <div id="login-screen">

            <h1>🏠 Roommate Bills</h1>

            <h2>Log In</h2>

            <form id="login-form">
                <label for="user-select">Name:</label>
                <select id="user-select" required>
                    <option value="">-- Select --</option>
                    <option value="Izzy Tak">Izzy Tak</option>
                    <option value="Milla">Milla</option>
                    <option value="Caliee">Caliee</option>
                    <option value="Vic">Vic</option>
                    <option value="Izzy Tate">Izzy Tate</option>
                </select>

                <label for="password-input">Password:</label>
                <input type="password" id="password-input" required>

                <button type="submit">Log In</button>

                <p id="login-error" style="color: red;"></p>
            </form>

            <p>
                <a href="#" id="set-password-link">Set / Reset Password</a>
            </p>

            <!-- Set / Reset Password Form (hidden by default) -->
            <div id="set-password-section" style="display: none;">
                <h3>Set or Reset Password</h3>

                <label for="set-user-select">Name:</label>
                <select id="set-user-select" required>
                    <option value="">-- Select --</option>
                    <option value="Izzy Tak">Izzy Tak</option>
                    <option value="Milla">Milla</option>
                    <option value="Caliee">Caliee</option>
                    <option value="Vic">Vic</option>
                    <option value="Izzy Tate">Izzy Tate</option>
                </select>

                <label for="new-password-input">New Password:</label>
                <input type="password" id="new-password-input" required>

                <label for="confirm-password-input">Confirm Password:</label>
                <input type="password" id="confirm-password-input" required>

                <button id="save-password-btn">Save Password</button>

                <p id="set-password-msg"></p>

                <p><a href="#" id="back-to-login">Back to Login</a></p>
            </div>

        </div>


        <!-- Dashboard -->
        <div id="dashboard" style="display:none;">

            <div class="header">

                <h1 id="welcome"></h1>

                <label for="monthSelect">Select Month:</label>

                <select id="monthSelect">
                    <option value="may2026">May-2026</option>
                    <option value="jun2026">June-2026</option>
                    <option value="jul2026">July-2026</option>
                    <option value="aug2026">August-2026</option>
                    <option value="sep2026">September-2026</option>
                    <option value="oct2026">October-2026</option>
                    <option value="nov2026">November-2026</option>
                    <option value="dec2026">December-2026</option>
                    <option value="jan2027">January-2027</option>
                    <option value="feb2027">February-2027</option>
                    <option value="mar2027">March-2027</option>
                    <option value="apr2027">April-2027</option>
                </select>

                <h2 id="displayMonth"></h2>

                <button id="change-user">
                    Change User
                </button>


            </div>

            <!-- Managed Bill -->
            <section id="managed-bill">

            </section>

            <!-- Owed Bills -->
            <section>

                <h2>What You Owe</h2>

                <div id="owed-list">

                </div>

            </section>

            <!-- Current Bills -->
            <section>

                <h2>Current Utility Bills</h2>

                <div id="current-bills">

                </div>

            </section>

        </div>

    </div>

    <script type="module" src="app.js"></script>

</body>

</html>
