<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Roommate Bills</title>

    <link rel="stylesheet"
          href="style.css">

    <link rel="manifest"
          href="manifest.json">

    <link rel="apple-touch-icon"
          href="icon-192.png">
</head>

<body>

    <div id="app">

        <!-- Login Screen -->
        <div id="login-screen">

            <h1>🏠 Roommate Bills</h1>

            <h2>Select Your Name</h2>

            <div id="user-buttons">
                <button data-user="Izzy Tak">Izzy Tak</button>
                <button data-user="Milla">Milla</button>
                <button data-user="Caliee">Caliee</button>
                <button data-user="Vic">Vic</button>
                <button data-user="Izzy Tate">Izzy Tate</button>
            </div>

        </div>

        <!-- Dashboard -->
        <div id="dashboard" style="display:none;">

            <div class="header">
                <h1 id="welcome"></h1>

                <button id="change-user">
                    Change User
                </button>
            </div>

            <!-- Managed Bill -->
            <section id="managed-bill">

            </section>

            <!-- Owed Bills -->
            <section>

                <h2>What You Owe</h2>

                <div id="owed-list">

                </div>

            </section>

            <!-- Current Bills -->
            <section>

                <h2>Current Utility Bills</h2>

                <div id="current-bills">

                </div>

            </section>

        </div>

    </div>

    <script type="module" src="app.js"></script>

</body>

</html>
